# 
# Deploy UDR
---
- hosts: localhost
  vars:
    add_network: 
          '[{ "name": "5g-net", 
          "ips": [ "{{ nodes.udr.ip }}/24" ],
          "mac": "{{ nodes.udr.mac }}"
          }]'
  tasks:
  - name: Login to OCP cluster
    k8s_auth:
      host: "{{ openshift.api_url }}"
      username: "{{ openshift.username }}"
      password: "{{ openshift.password }}"
      validate_certs: no
    register: k8s_auth_result

  - name: Create UDR config map
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: udr-config
          namespace: "{{ openshift.namespace }}"
        data:
          udrcfg.conf: |
            info:
              version: 3.0.1
              description: UDR initial local configuration

            configuration:
              sbi:
                scheme: https
                ipv4Addr: {{ nodes.udr.ip }}
                port: {{ udr_port }}
              mongodb:
                name: free5gc
                url: mongodb://{{ nodes.mongo.ip }}:{{ mongo_port }}
              nrfUri: https://{{ nodes.nrf.ip }}:{{ nrf_port }}

  - name: Deploy UDR CNF
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: Pod
        metadata:
          name: udr
          namespace: "{{ openshift.namespace }}"
          annotations:
            k8s.v1.cni.cncf.io/networks: "{{ add_network | to_json }}"
        spec:
          containers:
          - name: udr
            image: "{{ nodes.udr.image }}"
            command:
              - /free5gc/bin/./udr
            ports:
              - containerPort: "{{ udr_port }}"
            volumeMounts:
              - name: conf
                mountPath: /free5gc/config/udrcfg.conf
                subPath: udrcfg.conf
          volumes:
            - name: conf
              configMap:
                name: udr-config
                items:
                - key: udrcfg.conf
                  path: udrcfg.conf

  - name: Create UDR service
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}"
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        kind: Service
        apiVersion: v1
        metadata:
          name: udr-service
          namespace: "{{ openshift.namespace }}"
        spec:
          selector:
            app: udr
          ports:
          - protocol: TCP
            targetPort: "{{ udr_port }}"
            port: "{{ udr_port }}"

