# 
# Deploy MongoDB on OpenShift
---

- hosts: localhost
  vars:
    add_network: 
          '[{ "name": "5g-net", 
          "ips": [ "{{ nodes.mongo.ip }}/24" ],
          "mac": "{{ nodes.mongo.mac }}"
          }]'
  tasks:
  - name: Login
    include_tasks: ../login.yml

  - name: Create stateless MongoDB container
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition: 
        apiVersion: v1
        kind: Pod
        metadata:
          name: mongodb
          namespace: "{{ openshift.namespace }}"
          labels:
            app: mongodb
          annotations:
            k8s.v1.cni.cncf.io/networks: "{{ add_network | to_json }}"
        spec:
          containers:
          - name: mongodb
            image: mongo:3.6.3
            command:
              - mongod
            args:
              - "--bind_ip=0.0.0.0"
            ports:
              - containerPort: "{{ mongo_port }}"

  - name: Create MongoDB service
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}"
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: Service
        metadata:
          name: mongodb-svc
          namespace: "{{ openshift.namespace }}"
        spec:
          selector:
            app: mongodb
          ports:
            - port: "{{ mongo_port }}"
              targetPort: "{{ mongo_port }}"
