# 
# Deploy PCF
---
- hosts: localhost
  vars:
    add_network: 
          '[{ "name": "5g-net", 
          "ips": [ "{{ nodes.pcf.ip }}/24" ],
          "mac": "{{ nodes.pcf.mac }}"
          }]'
  tasks:
  - name: Login to OCP cluster
    k8s_auth:
      host: "{{ openshift.api_url }}"
      username: "{{ openshift.username }}"
      password: "{{ openshift.password }}"
      validate_certs: no
    register: k8s_auth_result

  - name: Create PCF config map
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: pcf-config
          namespace: "{{ openshift.namespace }}"
        data:
          pcfcfg.conf: |
            info:
              version: 3.0.1
              description: PCF initial local configuration

            configuration:
              pcfName: PCF
              sbi:
                scheme: https
                ipv4Addr: {{ nodes.pcf.ip }}
                port: {{ pcf_port }}
              timeFormat: 2020-01-01 10:10:10
              defaultBdtRefId: BdtPolicyId-
              nrfUri: https://{{ nodes.nrf.ip }}:{{ nrf_port }}
              serviceList:
                - serviceName: npcf-am-policy-control
                - serviceName: npcf-smpolicycontrol
                  suppFeat: 3fff
                - serviceName: npcf-bdtpolicycontrol
                - serviceName: npcf-policyauthorization
                  suppFeat: 3
                - serviceName: npcf-eventexposure
                - serviceName: npcf-ue-policy-control

  - name: Deploy PCF CNF
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: Pod
        metadata:
          name: pcf
          namespace: "{{ openshift.namespace }}"
          annotations:
            k8s.v1.cni.cncf.io/networks: "{{ add_network | to_json }}"
        spec:
          containers:
          - name: pcf
            image: "{{ nodes.pcf.image }}"
            command:
              - /free5gc/bin/./pcf
            ports:
              - containerPort: "{{ pcf_port }}"
            volumeMounts:
              - name: conf
                mountPath: /free5gc/config/pcfcfg.conf
                subPath: pcfcfg.conf
          volumes:
            - name: conf
              configMap:
                name: pcf-config
                items:
                - key: pcfcfg.conf
                  path: pcfcfg.conf

  - name: Create PCF service
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}"
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        kind: Service
        apiVersion: v1
        metadata:
          name: pcf-service
          namespace: "{{ openshift.namespace }}"
        spec:
          selector:
            app: pcf
          ports:
          - protocol: TCP
            targetPort: "{{ pcf_port }}"
            port: "{{ pcf_port }}"

