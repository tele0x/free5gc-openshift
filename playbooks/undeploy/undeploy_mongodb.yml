# 
# Undeploy MongoDB on OpenShift
---

- hosts: localhost
  tasks:
  - name: Login to OCP cluster
    k8s_auth:
      host: "{{ openshift.api_url }}"
      username: "{{ openshift.username }}"
      password: "{{ openshift.password }}"
      validate_certs: no
    register: k8s_auth_result

  - name: Remove MongoDB container
    k8s:
      state: absent
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      api_version: v1
      kind: Pod
      name: mongodb
      namespace: "{{ openshift.namespace }}"
      
  - name: Remove MongoDB service
    k8s:
      state: absent
      host: "{{ openshift.api_url }}"
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      api_version: v1
      kind: Service
      name: mongodb-svc
      namespace: "{{ openshift.namespace }}"
