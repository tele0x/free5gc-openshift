# 
# Deploy UPF
---
- hosts: localhost
  vars:
    add_network: 
          '[{ "name": "5g-net", 
          "ips": [ "{{ nodes.upf.ip }}/24" ],
          "mac": "{{ nodes.upf.mac }}"
          }]'
  tasks:
  - name: Login to OCP cluster
    k8s_auth:
      host: "{{ openshift.api_url }}"
      username: "{{ openshift.username }}"
      password: "{{ openshift.password }}"
      validate_certs: no
    register: k8s_auth_result

  - name: Create UPF config map
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: upf-config
          namespace: "{{ openshift.namespace }}"
        data:
          upfcfg.yaml: |
            info:
              version: 3.0.1
              description: UPF configuration

            configuration:
              # debugLevel: panic|fatal|error|warn|info|debug|trace
              debugLevel: info

              pfcp:
                - addr: {{ nodes.upf.ip }}

              gtpu:
                - addr: {{ nodes.upf.ip }}
                # - name: upf.5gc.nctu.me

              apn_list:
                - cidr: 60.60.0.0/24
                  apn: internet


  - name: Deploy UPF CNF
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: Pod
        metadata:
          name: upf
          namespace: "{{ openshift.namespace }}"
          annotations:
            k8s.v1.cni.cncf.io/networks: "{{ add_network | to_json }}"
        spec:
          containers:
          - name: upf
            image: "{{ nodes.upf.image }}"
            securityContext:
              capabilities:
                add:
                  - NET_ADMIN
            command: [ "/bin/sh" ]
            args: ["-c", "/free5gc/src/upf/build/bin/free5gc-upfd -f /free5gc/src/upf/build/config/upfcfg.yaml && ip addr add 60.60.0.100/24 dev lo"]
            volumeMounts:
              - name: conf
                mountPath: /free5gc/src/upf/build/config/upfcfg.yaml
                subPath: upfcfg.yaml
          volumes:
            - name: conf
              configMap:
                name: upf-config
                items:
                - key: upfcfg.yaml
                  path: upfcfg.yaml
