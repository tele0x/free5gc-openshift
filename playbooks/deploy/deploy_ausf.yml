# 
# Deploy AUSF
---
- hosts: localhost
  vars:
    add_network: 
          '[{ "name": "5g-net", 
          "ips": [ "{{ nodes.ausf.ip }}/24" ],
          "mac": "{{ nodes.ausf.mac }}"
          }]'
  tasks:
  - name: "Set stat for Workflow"
    set_stats:
      data:
        current_cnf: "AUSF"

  - name: Login
    include_tasks: ../login.yml

  - name: Create AUSF config map
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ausf-config
          namespace: "{{ openshift.namespace }}"
        data:
          ausfcfg.conf: |
            info:
              version: 3.0.1
              description: AUSF initial local configuration

            configuration:
              sbi:
                scheme: https
                registerIPv4: ausf-svc
                port: {{ ausf_port }}
              serviceNameList:
                - nausf-auth
              nrfUri: https://nrf-svc:{{ nrf_port }}
              plmnSupportList:
                - mcc: 208
                  mnc: 93
                - mcc: 123
                  mnc: 45
              groupId: ausfGroup001            

  - name: Deploy AUSF CNF
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: Pod
        metadata:
          name: ausf
          namespace: "{{ openshift.namespace }}"
          labels:
            app: ausf
          annotations:
            k8s.v1.cni.cncf.io/networks: "{{ add_network | to_json }}"
        spec:
          containers:
          - name: ausf
            image: "{{ nodes.ausf.image }}"
            command:
              - /free5gc/bin/./ausf
            ports:
              - containerPort: "{{ ausf_port }}"
            volumeMounts:
              - name: conf
                mountPath: /free5gc/config/ausfcfg.conf
                subPath: ausfcfg.conf
          volumes:
            - name: conf
              configMap:
                name: ausf-config
                items:
                - key: ausfcfg.conf
                  path: ausfcfg.conf

  - name: Create AUSF service
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}"
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        kind: Service
        apiVersion: v1
        metadata:
          name: ausf-svc
          namespace: "{{ openshift.namespace }}"
        spec:
          selector:
            app: ausf
          ports:
          - protocol: TCP
            targetPort: "{{ ausf_port }}"
            port: "{{ ausf_port }}"

