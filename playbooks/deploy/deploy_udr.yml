# 
# Deploy UDR
---
- hosts: localhost
  vars:
    add_network: 
          '[{ "name": "5g-net", 
          "ips": [ "{{ nodes.udr.ip }}/24" ],
          "mac": "{{ nodes.udr.mac }}"
          }]'
  tasks:
  - name: Set stat for Workflow
    set_stats:
      data:
        current_cnf: UDR

  - name: Login
    include_tasks: ../login.yml

  - name: Create UDR config map
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: udr-config
          namespace: "{{ openshift.namespace }}"
        data:
          udrcfg.conf: |
            info:
              version: 3.0.1
              description: UDR initial local configuration

            configuration:
              sbi:
                scheme: https
                registerIPv4: udr-svc
                port: {{ udr_port }}
              mongodb:
                name: free5gc
                url: mongodb://mongodb-svc:{{ mongo_port }}
              nrfUri: https://nrf-svc:{{ nrf_port }}

  - name: Deploy UDR CNF
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: Pod
        metadata:
          name: udr
          namespace: "{{ openshift.namespace }}"
          labels:
            app: udr
          annotations:
            k8s.v1.cni.cncf.io/networks: "{{ add_network | to_json }}"
        spec:
          containers:
          - name: udr
            image: "{{ nodes.udr.image }}"
            command:
              - /free5gc/bin/./udr
            ports:
              - containerPort: "{{ udr_port }}"
            volumeMounts:
              - name: conf
                mountPath: /free5gc/config/udrcfg.conf
                subPath: udrcfg.conf
          volumes:
            - name: conf
              configMap:
                name: udr-config
                items:
                - key: udrcfg.conf
                  path: udrcfg.conf

  - name: Create UDR service
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}"
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        kind: Service
        apiVersion: v1
        metadata:
          name: udr-svc
          namespace: "{{ openshift.namespace }}"
        spec:
          selector:
            app: udr
          ports:
          - protocol: TCP
            targetPort: "{{ udr_port }}"
            port: "{{ udr_port }}"

