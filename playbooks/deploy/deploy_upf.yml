# 
# Deploy UPF
---
- hosts: localhost
  vars:
    add_network: 
          '[{ "name": "5g-net", 
          "ips": [ "{{ nodes.upf.ip }}/24" ],
          "mac": "{{ nodes.upf.mac }}"
          }]'
  tasks:
  - name: Login to OCP cluster
    k8s_auth:
      host: "{{ openshift.api_url }}"
      username: "{{ openshift.username }}"
      password: "{{ openshift.password }}"
      validate_certs: no
    register: k8s_auth_result

  - name: Deploy UPF VNF
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
         apiVersion: kubevirt.io/v1alpha3
         kind: VirtualMachine
         metadata:
           name: upf-vm
           namespace: "{{ openshift.namespace }}"
           labels:
             app: upf-vm
         spec:
           running: true
           template:
             metadata:
               labels:
                 kubevirt.io/domain: upf-vm
                 vm.kubevirt.io/name: upf-vm
             spec:
               domain:
                 cpu:
                   cores: 1
                   sockets: 1
                   threads: 1
                 devices:
                   disks:
                     - bootOrder: 1
                       disk:
                         bus: virtio
                       name: containerdisk
                     - disk:
                         bus: virtio
                       name: cloudinitdisk
                   interfaces:
                     - masquerade: {}
                       model: virtio
                       name: nic-0
                     - bridge: {}
                       model: virtio
                       name: bridge-net1
                   networkInterfaceMultiqueue: true
                   rng: {}
                 machine:
                   type: pc-q35-rhel8.2.0
                 resources:
                   requests:
                     memory: 1Gi
               evictionStrategy: LiveMigrate
               hostname: upf-vm
               networks:
                 - name: nic-0
                   pod: {}
                 - name: bridge-net1
                   multus:
                     networkName: bridge-net 
               terminationGracePeriodSeconds: 180
               volumes:
                 - containerDisk:
                         image: "{{ nodes.upf.image }}"
                   name: containerdisk
                 - cloudInitNoCloud:
                     userData: |-
                       #!/bin/bash
                       ifconfig enp2s0 {{ nodes.upf.ip }} netmask 255.255.255.0
                       sed -e 's/127.0.0.8/{{ nodes.upf.ip }}/g' -i /free5gc/src/upf/build/config/upfcfg.yaml
                       sed -e '/.*cidr.*/a \     \ natifname: enp1s0' -i /free5gc/src/upf/build/config/upfcfg.yaml
                       screen -d -m /free5gc/src/upf/build/bin/free5gc-upfd -f /free5gc/src/upf/build/config/upfcfg.yaml
                   name: cloudinitdisk
