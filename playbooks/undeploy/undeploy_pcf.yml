# 
# Undeploy PCF
---
- hosts: localhost
  tasks:
  - name: Login
    include_tasks: ../login.yml

  - name: Remove PCF config map
    k8s:
      state: absent
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      api_version: v1
      kind: ConfigMap
      name: pcf-config
      namespace: "{{ openshift.namespace }}"
      
  - name: Remove PCF CNF
    k8s:
      state: absent
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      api_version: v1
      kind: Pod
      name: pcf
      namespace: "{{ openshift.namespace }}"

  - name: Remove PCF service
    k8s:
      state: absent
      host: "{{ openshift.api_url }}"
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      api_version: v1
      kind: Service
      name: pcf-svc
      namespace: "{{ openshift.namespace }}"

