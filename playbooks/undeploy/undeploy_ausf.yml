# 
# Undeploy AUSF
---
- hosts: localhost
  tasks:
  - name: Login to OCP cluster
    k8s_auth:
      host: "{{ openshift.api_url }}"
      username: "{{ openshift.username }}"
      password: "{{ openshift.password }}"
      validate_certs: no
    register: k8s_auth_result

  - name: Remove AUSF config map
    k8s:
      state: absent
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      api_version: v1
      kind: ConfigMap
      name: ausf-config
      namespace: "{{ openshift.namespace }}"
      
  - name: Remove AUSF CNF
    k8s:
      state: absent
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      api_version: v1
      kind: Pod
      name: ausf
      namespace: "{{ openshift.namespace }}"

  - name: Remove AUSF service
    k8s:
      state: absent
      host: "{{ openshift.api_url }}"
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      api_version: v1
      kind: Service
      name: ausf-service
      namespace: "{{ openshift.namespace }}"

