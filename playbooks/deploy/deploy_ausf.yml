# 
# Deploy AUSF
---
- hosts: localhost
  vars:
    add_network: 
          '[{ "name": "5g-net", 
          "ips": [ "{{ nodes.ausf.ip }}/24" ],
          "mac": "{{ nodes.ausf.mac }}"
          }]'
  tasks:
  - name: Login to OCP cluster
    k8s_auth:
      host: "{{ openshift.api_url }}"
      username: "{{ openshift.username }}"
      password: "{{ openshift.password }}"
      validate_certs: no
    register: k8s_auth_result

  - name: Create AUSF config map
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ausf-config
          namespace: "{{ openshift.namespace }}"
        data:
          ausfcfg.conf: |
            info:
              version: 3.0.1
              description: AUSF initial local configuration

            configuration:
              sbi:
                scheme: https
                ipv4Addr: {{ nodes.ausf.ip }}
                port: {{ ausf_port }}
              serviceNameList:
                - nausf-auth
              nrfUri: https://{{ nodes.nrf.ip }}:{{ nrf_port }}
              plmnSupportList:
                - mcc: 208
                  mnc: 93
                - mcc: 123
                  mnc: 45
              groupId: ausfGroup001            

  - name: Deploy AUSF CNF
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: Pod
        metadata:
          name: ausf
          namespace: "{{ openshift.namespace }}"
          annotations:
            k8s.v1.cni.cncf.io/networks: "{{ add_network | to_json }}"
        spec:
          containers:
          - name: ausf
            image: "{{ nodes.ausf.image }}"
            command:
              - /free5gc/bin/./ausf
            ports:
              - containerPort: "{{ ausf_port }}"
            volumeMounts:
              - name: conf
                mountPath: /free5gc/config/ausfcfg.conf
                subPath: ausfcfg.conf
          volumes:
            - name: conf
              configMap:
                name: ausf-config
                items:
                - key: ausfcfg.conf
                  path: ausfcfg.conf


