# 
# Deploy NSSF
---
- hosts: localhost
  vars:
    add_network: 
          '[{ "name": "5g-net", 
          "ips": [ "{{ nodes.nssf.ip }}/24" ],
          "mac": "{{ nodes.nssf.mac }}"
          }]'
  tasks:
  - name: Set stat for Workflow
    set_stats:
      data:
        current_cnf: NSSF

  - name: Login
    include_tasks: ../login.yml

  - name: Create NSSF config map
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: nssf-config
          namespace: "{{ openshift.namespace }}"
        data:
          nssfcfg.conf: |
            info:
              version: 1.0.0
              description: NSSF initial local configuration

            configuration:
              nssfName: NSSF
              sbi:
                scheme: https
                registerIPv4: nssf-svc
                port: {{ nssf_port }}
              serviceNameList:
                - nnssf-nsselection
                - nnssf-nssaiavailability
              nrfUri: https://nrf-svc:{{ nrf_port }}
              supportedPlmnList:
                - mcc: 208
                  mnc: 93
              supportedNssaiInPlmnList:
                - plmnId:
                    mcc: 208
                    mnc: 93
                  supportedSnssaiList:
                    - sst: 1
                      sd: 010203
                    - sst: 1
                      sd: 112233
                    - sst: 1
                      sd: 3
                    - sst: 2
                      sd: 1
                    - sst: 2
                      sd: 2
              nsiList:
                - snssai:
                    sst: 1
                  nsiInformationList:
                    - nrfId: https://nrf-svc:{{ nrf_port }}/nnrf-nfm/v1/nf-instances
                      nsiId: 10
                - snssai:
                    sst: 1
                    sd: 1
                  nsiInformationList:
                    - nrfId: https://nrf-svc:{{ nrf_port }}/nnrf-nfm/v1/nf-instances
                      nsiId: 11
                - snssai:
                    sst: 1
                    sd: 2
                  nsiInformationList:
                    - nrfId: https://nrf-svc:{{ nrf_port }}/nnrf-nfm/v1/nf-instances
                      nsiId: 12
                    - nrfId: https://nrf-svc:{{ nrf_port }}/nnrf-nfm/v1/nf-instances
                      nsiId: 12
                - snssai:
                    sst: 1
                    sd: 3
                  nsiInformationList:
                    - nrfId: https://nrf-svc:{{ nrf_port }}/nnrf-nfm/v1/nf-instances
                      nsiId: 13
                - snssai:
                    sst: 2
                  nsiInformationList:
                    - nrfId: https://nrf-svc:{{ nrf_port }}/nnrf-nfm/v1/nf-instances
                      nsiId: 20
                - snssai:
                    sst: 2
                    sd: 1
                  nsiInformationList:
                    - nrfId: https://nrf-svc:{{ nrf_port }}/nnrf-nfm/v1/nf-instances
                      nsiId: 21
                - snssai:
                    sst: 1
                    sd: 010203
                  nsiInformationList:
                    - nrfId: https://nrf-svc:{{ nrf_port }}/nnrf-nfm/v1/nf-instances
                      nsiId: 22
              amfSetList:
                - amfSetId: 1
                  amfList:
                    - ffa2e8d7-3275-49c7-8631-6af1df1d9d26
                    - 0e8831c3-6286-4689-ab27-1e2161e15cb1
                    - a1fba9ba-2e39-4e22-9c74-f749da571d0d
                  nrfAmfSet: http://localhost:8081/nnrf-nfm/v1/nf-instances
                  supportedNssaiAvailabilityData:
                    - tai:
                        plmnId:
                          mcc: 466
                          mnc: 92
                        tac: 33456
                      supportedSnssaiList:
                        - sst: 1
                          sd: 1
                        - sst: 1
                          sd: 2
                        - sst: 2
                          sd: 1
                    - tai:
                        plmnId:
                          mcc: 466
                          mnc: 92
                        tac: 33457
                      supportedSnssaiList:
                        - sst: 1
                        - sst: 1
                          sd: 1
                        - sst: 1
                          sd: 2
                - amfSetId: 2
                  nrfAmfSet: http://localhost:8084/nnrf-nfm/v1/nf-instances
                  supportedNssaiAvailabilityData:
                    - tai:
                        plmnId:
                          mcc: 466
                          mnc: 92
                        tac: 33456
                      supportedSnssaiList:
                        - sst: 1
                        - sst: 1
                          sd: 1
                        - sst: 1
                          sd: 3
                        - sst: 2
                          sd: 1
                    - tai:
                        plmnId:
                          mcc: 466
                          mnc: 92
                        tac: 33458
                      supportedSnssaiList:
                        - sst: 1
                        - sst: 1
                          sd: 1
                        - sst: 2
              amfList:
                - nfId: 469de254-2fe5-4ca0-8381-af3f500af77c
                  supportedNssaiAvailabilityData:
                    - tai:
                        plmnId:
                          mcc: 466
                          mnc: 92
                        tac: 33456
                      supportedSnssaiList:
                        - sst: 1
                        - sst: 1
                          sd: 2
                        - sst: 2
                    - tai:
                        plmnId:
                          mcc: 466
                          mnc: 92
                        tac: 33457
                      supportedSnssaiList:
                        - sst: 1
                          sd: 1
                        - sst: 1
                          sd: 2
                - nfId: fbe604a8-27b2-417e-bd7c-8a7be2691f8d
                  supportedNssaiAvailabilityData:
                    - tai:
                        plmnId:
                          mcc: 466
                          mnc: 92
                        tac: 33458
                      supportedSnssaiList:
                        - sst: 1
                        - sst: 1
                          sd: 1
                        - sst: 1
                          sd: 3
                        - sst: 2
                    - tai:
                        plmnId:
                          mcc: 466
                          mnc: 92
                        tac: 33459
                      supportedSnssaiList:
                        - sst: 1
                        - sst: 1
                          sd: 1
                        - sst: 2
                        - sst: 2
                          sd: 1
                - nfId: b9e6e2cb-5ce8-4cb6-9173-a266dd9a2f0c
                  supportedNssaiAvailabilityData:
                    - tai:
                        plmnId:
                          mcc: 466
                          mnc: 92
                        tac: 33456
                      supportedSnssaiList:
                        - sst: 1
                        - sst: 1
                          sd: 1
                        - sst: 1
                          sd: 2
                        - sst: 2
                    - tai:
                        plmnId:
                          mcc: 466
                          mnc: 92
                        tac: 33458
                      supportedSnssaiList:
                        - sst: 1
                        - sst: 1
                          sd: 1
                        - sst: 2
                        - sst: 2
                          sd: 1
              taList:
                - tai:
                    plmnId:
                      mcc: 466
                      mnc: 92
                    tac: 33456
                  accessType: 3GPP_ACCESS
                  supportedSnssaiList:
                    - sst: 1
                    - sst: 1
                      sd: 1
                    - sst: 1
                      sd: 2
                    - sst: 2
                - tai:
                    plmnId:
                      mcc: 466
                      mnc: 92
                    tac: 33457
                  accessType: 3GPP_ACCESS
                  supportedSnssaiList:
                    - sst: 1
                    - sst: 1
                      sd: 1
                    - sst: 1
                      sd: 2
                    - sst: 2
                - tai:
                    plmnId:
                      mcc: 466
                      mnc: 92
                    tac: 33458
                  accessType: 3GPP_ACCESS
                  supportedSnssaiList:
                    - sst: 1
                    - sst: 1
                      sd: 1
                    - sst: 1
                      sd: 3
                    - sst: 2
                  restrictedSnssaiList:
                    - homePlmnId:
                        mcc: 310
                        mnc: 560
                      sNssaiList:
                        - sst: 1
                          sd: 3
                - tai:
                    plmnId:
                      mcc: 466
                      mnc: 92
                    tac: 33459
                  accessType: 3GPP_ACCESS
                  supportedSnssaiList:
                    - sst: 1
                    - sst: 1
                      sd: 1
                    - sst: 2
                    - sst: 2
                      sd: 1
                  restrictedSnssaiList:
                    - homePlmnId:
                        mcc: 310
                        mnc: 560
                      sNssaiList:
                        - sst: 2
                          sd: 1
              mappingListFromPlmn:
                - operatorName: NTT Docomo
                  homePlmnId:
                    mcc: 440
                    mnc: 10
                  mappingOfSnssai:
                    - servingSnssai:
                        sst: 1
                        sd: 1
                      homeSnssai:
                        sst: 1
                        sd: 1
                    - servingSnssai:
                        sst: 1
                        sd: 2
                      homeSnssai:
                        sst: 1
                        sd: 3
                    - servingSnssai:
                        sst: 1
                        sd: 3
                      homeSnssai:
                        sst: 1
                        sd: 4
                    - servingSnssai:
                        sst: 2
                        sd: 1
                      homeSnssai:
                        sst: 2
                        sd: 2
                - operatorName: AT&T Mobility
                  homePlmnId:
                    mcc: 310
                    mnc: 560
                  mappingOfSnssai:
                    - servingSnssai:
                        sst: 1
                        sd: 1
                      homeSnssai:
                        sst: 1
                        sd: 2
                    - servingSnssai:
                        sst: 1
                        sd: 2
                      homeSnssai:
                        sst: 1
                        sd: 3

  - name: Deploy NSSF CNF
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: Pod
        metadata:
          name: nssf
          namespace: "{{ openshift.namespace }}"
          labels:
            app: nssf
          annotations:
            k8s.v1.cni.cncf.io/networks: "{{ add_network | to_json }}"
        spec:
          containers:
          - name: nssf
            image: "{{ nodes.nssf.image }}"
            command:
              - /free5gc/bin/./nssf
            ports:
              - containerPort: "{{ nssf_port }}"
            volumeMounts:
              - name: conf
                mountPath: /free5gc/config/nssfcfg.conf
                subPath: nssfcfg.conf
          volumes:
            - name: conf
              configMap:
                name: nssf-config
                items:
                - key: nssfcfg.conf
                  path: nssfcfg.conf

  - name: Create NSSF service
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}"
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        kind: Service
        apiVersion: v1
        metadata:
          name: nssf-svc
          namespace: "{{ openshift.namespace }}"
        spec:
          selector:
            app: nssf
          ports:
          - protocol: TCP
            targetPort: "{{ nssf_port }}"
            port: "{{ nssf_port }}"

