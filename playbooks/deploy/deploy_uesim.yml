# 
# Deploy UE RAN Simulator
---
- hosts: localhost
  vars:
    add_network: 
          '[{ "name": "5g-net", 
          "ips": [ "{{ nodes.uesim.ip }}/24" ],
          "mac": "{{ nodes.uesim.mac }}"
          }]'
  tasks:
  - name: Login to OCP cluster
    k8s_auth:
      host: "{{ openshift.api_url }}"
      username: "{{ openshift.username }}"
      password: "{{ openshift.password }}"
      validate_certs: no
    register: k8s_auth_result

  - name: Create UE Sim config map
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: uesim-config
          namespace: "{{ openshift.namespace }}"
        data:
          uesim.conf: |
            MongoDBName: "free5gc"
            MongoDBUrl: "mongodb://{{ nodes.mongodb.ip }}:{{ nodes.mongodb.port }}"
            RanIP: "{{ nodes.uesim.ip }}"
            AmfIP: "{{ nodes.amf.ip }}"
            UpfIP: "{{ nodes.upf.ip }}"

  - name: Deploy UE Sim CNF
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: Pod
        metadata:
          name: uesim
          namespace: "{{ openshift.namespace }}"
          annotations:
            k8s.v1.cni.cncf.io/networks: "{{ add_network | to_json }}"
        spec:
          containers:
          - name: uesim
            image: "{{ nodes.uesim.image }}"
            command: [ "/bin/sh", "-c" , "sleep 200000" ]
            volumeMounts:
              - name: conf
                mountPath: /free5gc/config/test/uesim.conf
                subPath: uesim.conf
          volumes:
            - name: conf
              configMap:
                name: uesim-config
                items:
                - key: uesim.conf
                  path: uesim.conf
