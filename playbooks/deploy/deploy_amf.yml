# 
# Deploy AMF
---
- hosts: localhost
  vars:
    add_network: 
          '[{ "name": "5g-net", 
          "ips": [ "{{ nodes.amf.ip }}/24" ],
          "mac": "{{ nodes.amf.mac }}"
          }]'
  tasks:
  - name: Set stat for Workflow
    set_stats:
      data:
        current_cnf: AMF

  - name: Login
    include_tasks: ../login.yml

  - name: Create AMF config map
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: amf-config
          namespace: "{{ openshift.namespace }}"
        data:
          amfcfg.conf: |
            info:
              version: 3.0.1
              description: AMF initial local configuration

            configuration:
              amfName: AMF
              ngapIpList:
                - {{ nodes.amf.ip }}
              sbi:
                scheme: https
                registerIPv4: amf-svc
                port: {{ amf_port }}
              serviceNameList:
                - namf-comm
                - namf-evts
                - namf-mt
                - namf-loc
                - namf-oam        
              servedGuamiList:
                - plmnId:
                    mcc: 208
                    mnc: 93
                  amfId: cafe00
              supportTaiList:
                - plmnId:
                    mcc: 208
                    mnc: 93
                  tac: 1
              plmnSupportList:
                - plmnId:
                    mcc: 208
                    mnc: 93
                  snssaiList:
                    - sst: 1
                      sd: 010203
                    - sst: 1
                      sd: 112233
              supportDnnList:
                - internet
              nrfUri: https://nrf-svc:{{ nrf_port }}
              security:
                integrityOrder:
                  - NIA2
                  - NIA0
                cipheringOrder:
                  - NEA2
                  - NEA0
              networkName:
                full: free5GC
                short: free
              t3502: 720
              t3512: 3600
              non3gppDeregistrationTimer: 3240

  - name: Deploy AMF CNF
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        apiVersion: v1
        kind: Pod
        metadata:
          name: amf
          namespace: "{{ openshift.namespace }}"
          labels:
            app: amf
          annotations:
            k8s.v1.cni.cncf.io/networks: "{{ add_network | to_json }}"
        spec:
          containers:
          - name: amf
            image: "{{ nodes.amf.image }}"
            command:
              - /free5gc/bin/./amf
            ports:
              - containerPort: "{{ amf_port }}"
            volumeMounts:
              - name: conf
                mountPath: /free5gc/config/amfcfg.conf
                subPath: amfcfg.conf
          volumes:
            - name: conf
              configMap:
                name: amf-config
                items:
                - key: amfcfg.conf
                  path: amfcfg.conf

  - name: Create AMF service
    k8s:
      state: present
      apply: yes
      host: "{{ openshift.api_url }}"
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      definition:
        kind: Service
        apiVersion: v1
        metadata:
          name: amf-svc
          namespace: "{{ openshift.namespace }}"
        spec:
          selector:
            app: amf
          ports:
          - protocol: TCP
            targetPort: "{{ amf_port }}"
            port: "{{ amf_port }}"
