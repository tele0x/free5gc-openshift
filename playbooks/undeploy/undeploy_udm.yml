# 
# Undeploy UDM
---
- hosts: localhost
  tasks:
  - name: Login
    include_tasks: ../login.yml

  - name: Remove UDM config map
    k8s:
      state: absent
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      api_version: v1
      kind: ConfigMap
      name: udm-config
      namespace: "{{ openshift.namespace }}"
      
  - name: Remove UDM CNF
    k8s:
      state: absent
      host: "{{ openshift.api_url }}" 
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      api_version: v1
      kind: Pod
      name: udm
      namespace: "{{ openshift.namespace }}"

  - name: Remove UDM service
    k8s:
      state: absent
      host: "{{ openshift.api_url }}"
      api_key: "{{ k8s_auth_result.k8s_auth.api_key }}"
      validate_certs: no
      api_version: v1
      kind: Service
      name: udm-svc
      namespace: "{{ openshift.namespace }}"

